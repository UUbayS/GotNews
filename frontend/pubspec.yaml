name: newsscroll
description: A TikTok-style News Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.6
  share_plus: ^10.0.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/